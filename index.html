<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELAS e.V. — Empowering Migrant Communities in Germany</title>
    <meta name="description" content="ELAS e.V. — Registered non-profit supporting migrant women and marginalized communities in Kassel, Germany." />
    <meta name="author" content="ELAS e.V." />
    <meta name="theme-color" content="#ffffff" />
    <link rel="icon" href="/favicon.ico">
    <!-- Favicons and app icons: replace placeholder.svg/favicon.ico with real brand assets on the server -->
    <link rel="icon" href="https://elas-de.org/favicon.ico" sizes="32x32" />
    <link rel="icon" href="https://elas-de.org/logo-elas.svg" type="image/svg+xml" />
    <link rel="icon" href="/logo-elas.svg" sizes="any" />
    <link rel="apple-touch-icon" href="https://elas-de.org/logo-elas.svg" />

    <!-- Language alternates -->
    <link rel="alternate" href="https://elas-de.org/" hreflang="de" />
    <link rel="alternate" href="https://elas-de.org/" hreflang="en" />
    <link rel="canonical" href="https://elas-de.org" />

    <!-- Ensure english alternate points to URL with ?lang=en so searches open en version -->
    <script>
      (function () {
        try {
          const enLink = document.querySelector('link[hreflang="en"]');
          if (!enLink) return;

          // Force the english alternate to include lang=en so shared/crawled links
          // point to the English version (e.g. https://elas-de.org/?lang=en)
          const url = new URL(enLink.getAttribute('href') || window.location.href);
          url.searchParams.set('lang', 'en');
          enLink.setAttribute('href', url.toString());

          // If current page has lang=en, also update the en alternate to the current page
          const current = new URL(window.location.href);
          if (current.searchParams.get('lang') === 'en') {
            const currentEn = new URL(window.location.href);
            currentEn.searchParams.set('lang', 'en');
            enLink.setAttribute('href', currentEn.toString());
          }
        } catch (e) {
          // ignore
        }
      })();
    </script>

        <!-- Structured data (Organization) -->
        <!-- Prefer providing both an SVG (for site display) and a PNG (for Search/structured data).
          Ensure /logo-elas.png and /logo-elas.svg exist on the production host. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ELAS e.V.",
      "url": "https://elas-de.org",
      "logo": "https://elas-de.org/logo-elas.png",
      "contactPoint": [{
        "@type": "ContactPoint",
        "email": "hello@elas-de.org",
        "contactType": "information",
        "areaServed": "DE",
        "availableLanguage": ["German","English"]
      }],
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Treppenstraße 4",
        "addressLocality": "Kassel",
        "postalCode": "34117",
        "addressCountry": "DE"
      }
    }
    </script>

    <meta property="og:title" content="ELAS e.V. — Empowering Migrant Communities" />
    <meta property="og:description" content="A registered non-profit organization providing information and support for migrant women, FLINTA, queer and marginalized communities." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

  </head>
